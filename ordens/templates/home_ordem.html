{% extends "base.html" %}

{% block title %}SisGeOS — Ordens de Serviço{% endblock %}
{% block nav_ordem %}active fw-semibold{% endblock %}

{% block content %}
<div class="px-2 py-4 py-md-5 text-center">
    <h1 class="display-6 fw-bold text-body-emphasis">Gerenciador de Ordens de Serviços</h1>
    <div class="col-lg-6 mx-auto">
        <p class="lead mb-4">Crie ou liste as Ordens de Serviço.</p>
        <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
            <a href="{% url 'criar_ordem' %}" class="btn btn-primary btn-lg px-4">
                <i class="bi bi-plus-circle me-1" aria-hidden="true"></i>Criar Ordem
            </a>
            <a href="{% url 'listar_ordens' %}" class="btn btn-outline-secondary btn-lg px-4">
                <i class="bi bi-list-ul me-1" aria-hidden="true"></i>Listar Ordens
            </a>
        </div>
    </div>
</div>
{% endblock %}
