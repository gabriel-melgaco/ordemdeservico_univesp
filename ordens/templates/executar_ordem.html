{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}SisGeOS — Executar OS #{{ ordem.id }}{% endblock %}
{% block nav_ordem %}active{% endblock %}

{% block content %}
<h1 class="h3 mb-4">
    <i class="bi bi-play-circle me-2" aria-hidden="true"></i>Executar OS
    <span class="text-muted">#{{ ordem.id }}</span>
</h1>

<div class="card shadow-sm" style="max-width:640px;">
    <div class="card-body p-4">
        <form method="post" novalidate aria-label="Formulário para executar a ordem {{ ordem.id }}">
            {% csrf_token %}
            {% crispy form %}
        </form>
    </div>
</div>
{% endblock %}
