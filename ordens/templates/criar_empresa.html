<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SisGeOS / Cadastrar Empresa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .container_form {
            max-width: 700px;
            margin: 30px auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="container_form">
        <h3 class="text-center mb-4">Cadastrar Empresa</h3>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post" id="empresa-form">
            {% csrf_token %}

            <div class="input-group mb-3">
                <input type="text" id="id_cnpj" name="cnpj" class="form-control" placeholder="Digite o CNPJ" required>
                <button type="button" class="btn btn-success" id="btn-buscar-cnpj">Buscar</button>
            </div>

            <div class="mb-3">
                <label class="form-label">Nome Fantasia</label>
                <input type="text" id="id_nome_fantasia" name="nome_fantasia" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Razão Social</label>
                <input type="text" id="id_razao_social" name="razao_social" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Inscrição Estadual</label>
                <input type="text" id="id_inscricao_estadual" name="inscricao_estadual" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">E-mail</label>
                <input type="email" id="id_email" name="email" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Endereço</label>
                <input type="text" id="id_endereco" name="endereco" class="form-control">
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Bairro</label>
                    <input type="text" id="id_bairro" name="bairro" class="form-control">
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Cidade</label>
                    <input type="text" id="id_cidade" name="cidade" class="form-control">
                </div>

                <div class="col-md-2 mb-3">
                    <label class="form-label">UF</label>
                    <input type="text" id="id_estado" name="estado" class="form-control">
                </div>

                <div class="col-md-2 mb-3">
                    <label class="form-label">CEP</label>
                    <input type="text" id="id_cep" name="cep" class="form-control">
                </div>
            </div>

            <div class="text-center mt-4">
                <button type="submit" class="btn btn-primary px-5">Salvar Empresa</button>
            </div>
        </form>
    </div>
</div>

<script>
document.getElementById('btn-buscar-cnpj').addEventListener('click', function() {
    const cnpj = document.getElementById('id_cnpj').value.replace(/\D/g, '');
    if (cnpj.length !== 14) {
        alert('CNPJ inválido!');
        return;
    }

    fetch(`https://receitaws.com.br/v1/cnpj/${cnpj}`)
        .then(response => response.json())
        .then(data => {
            if (data.status === 'ERROR') {
                alert('Erro: ' + data.message);
                return;
            }

            document.getElementById('id_nome_fantasia').value = data.fantasia || '';
            document.getElementById('id_razao_social').value = data.nome || '';
            document.getElementById('id_inscricao_estadual').value = data.inscricao_estadual || '';
            document.getElementById('id_email').value = data.email || '';
            document.getElementById('id_endereco').value = data.logradouro || '';
            document.getElementById('id_bairro').value = data.bairro || '';
            document.getElementById('id_cidade').value = data.municipio || '';
            document.getElementById('id_estado').value = data.uf || '';
            document.getElementById('id_cep').value = data.cep || '';
        })
        .catch(err => {
            console.error('Erro ao consultar CNPJ:', err);
            alert('Erro ao consultar o CNPJ. Tente novamente mais tarde.');
        });
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
