{% extends "base_auth.html" %}
{% load crispy_forms_tags %}

{% block title %}SisGeOS — Registrar Usuário{% endblock %}
{% block auth_title %}Registrar Usuário{% endblock %}

{% block auth_content %}
<p class="text-center text-muted small mb-3">
    Preencha os dados e selecione o grupo de acesso.
</p>
<form method="post" novalidate aria-label="Formulário de registro de usuário">
    {% csrf_token %}
    {% crispy form %}
</form>
{% endblock %}
