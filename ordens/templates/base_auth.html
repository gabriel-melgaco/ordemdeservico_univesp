<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SisGeOS{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT"
          crossorigin="anonymous">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        html, body { height: 100%; }
        body {
            display: flex;
            flex-direction: column;
            background-color: var(--bs-body-bg);
        }
        .auth-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .auth-card {
            width: 100%;
            max-width: 440px;
        }
        .auth-illustration {
            max-width: 280px;
            width: 100%;
        }
        /* Ilustração visível só em telas md+ */
        @media (max-width: 767.98px) {
            .auth-illustration-col { display: none; }
        }
        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>

<!-- SVG symbols -->
<svg xmlns="http://www.w3.org/2000/svg" class="d-none" aria-hidden="true">
    <symbol id="sisGeos" viewBox="0 0 32 32">
        <title>SiGeOS</title>
        <path fill-rule="evenodd" clip-rule="evenodd"
              d="M16 0c8.837 0 16 7.163 16 16S24.837 32 16 32 0 24.837 0 16 7.163 0 16 0zm-2.293 7.295v18.298h4.293c1.62 0 2.858-.127 3.714-.38a7.327 7.327 0 0 0 2.367-1.242c.61-.49 1.045-1.106 1.293-1.847.255-.74.393-1.66.412-2.757h-4.975c0 .663-.053 1.158-.164 1.478-.102.319-.305.593-.606.822-.314.23-.694.387-1.138.468-.444.081-.968.122-1.572.122h-1.354V7.295zm-6.782 8.592v7.496h4.975v-7.496zM16.793 7.5v4.975h4.975V7.5z"/>
    </symbol>
    <symbol id="linkedin" viewBox="0 0 16 16">
        <path d="M15.9 0H0.1A.1.1 0 000 .1v15.8c0 .055.045.1.1.1h15.8c.055 0 .1-.045.1-.1V.1A.1.1 0 0015.9 0zM4.772 13.683H2.375V5.955h2.397v7.728zM3.574 4.987c-.833 0-1.502-.676-1.502-1.511s.669-1.511 1.502-1.511c.833 0 1.511.676 1.511 1.511s-.678 1.511-1.511 1.511zM13.683 13.683h-2.397v-4.358c0-1.040-.022-2.376-1.446-2.376-1.447 0-1.67 1.133-1.67 2.305v4.429H5.854V5.955h2.305v1.052h.032c.32-.609 1.112-1.25 2.287-1.25 2.446 0 2.894 1.611 2.894 3.705v4.222z"/>
    </symbol>
</svg>

<!-- Cabeçalho mínimo -->
<nav class="navbar bg-white border-bottom shadow-sm" aria-label="Navegação mínima">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2 fw-semibold"
           href="/" aria-label="SisGeOS — Página inicial">
            <svg width="24" height="24" aria-hidden="true"><use xlink:href="#sisGeos"/></svg>
            SisGeOS
        </a>
        <a href="{% url 'home' %}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-house me-1" aria-hidden="true"></i>
            <span class="d-none d-sm-inline">Início</span>
        </a>
    </div>
</nav>

<!-- Conteúdo centralizado -->
<div class="auth-wrapper">
    <div class="container">
        <div class="row justify-content-center align-items-center g-4">

            <!-- Ilustração (oculta em mobile) -->
            <div class="col-md-5 col-lg-4 text-center auth-illustration-col">
                <img src="https://mdbcdn.b-cdn.net/img/Photos/new-templates/bootstrap-login-form/draw2.webp"
                     class="auth-illustration img-fluid"
                     alt="Ilustração do sistema SisGeOS">
            </div>

            <!-- Card de autenticação -->
            <div class="col-12 col-md-7 col-lg-5">
                <div class="card shadow auth-card border-0">
                    <div class="card-body p-4 p-md-5">
                        <div class="text-center mb-4">
                            <svg width="36" height="36" class="mb-2" aria-hidden="true">
                                <use xlink:href="#sisGeos"/>
                            </svg>
                            <h1 class="h4 mb-0">{% block auth_title %}SisGeOS{% endblock %}</h1>
                        </div>

                        {% if messages %}
                        <div role="alert" aria-live="polite" class="mb-3">
                            {% for message in messages %}
                            <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show py-2" role="alert">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fechar"></button>
                            </div>
                            {% endfor %}
                        </div>
                        {% endif %}

                        {% block auth_content %}{% endblock %}
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- Rodapé mínimo -->
<footer class="border-top py-3 bg-white text-center">
    <div class="container d-flex flex-wrap justify-content-between align-items-center gap-2">
        <span class="text-body-secondary small">
            UNIVESP — DRP03-PJI110-SALA-002GRUPO-006 &copy; 2025
        </span>
        <a href="https://www.linkedin.com/in/josecemessias"
           class="text-body-secondary"
           aria-label="LinkedIn de José Messias"
           target="_blank" rel="noopener noreferrer">
            <svg width="18" height="18" aria-hidden="true"><use xlink:href="#linkedin"/></svg>
        </a>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
        crossorigin="anonymous"></script>

{% block extra_js %}{% endblock %}
</body>
</html>
