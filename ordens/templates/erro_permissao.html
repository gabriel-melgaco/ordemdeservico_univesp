{% extends "base.html" %}

{% block title %}SisGeOS — Sem Permissão{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-12 col-sm-8 col-md-6 col-lg-5 text-center">
        <div class="p-4 p-md-5 bg-body-tertiary border rounded-3 shadow-sm">
            <i class="bi bi-shield-lock display-3 text-danger mb-3 d-block" aria-hidden="true"></i>
            <h1 class="h3 text-danger">Acesso Negado</h1>
            <p class="text-muted mb-4">
                Você não tem permissão para acessar esta página.<br>
                Entre em contato com o administrador ou faça login com uma conta autorizada.
            </p>
            <div class="d-flex justify-content-center gap-2 flex-wrap">
                <a href="{% url 'login' %}" class="btn btn-primary">
                    <i class="bi bi-box-arrow-in-right me-1" aria-hidden="true"></i>Fazer Login
                </a>
                <a href="{% url 'home' %}" class="btn btn-outline-secondary">
                    <i class="bi bi-house me-1" aria-hidden="true"></i>Página Inicial
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
