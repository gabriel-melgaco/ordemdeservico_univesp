{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}SisGeOS — Atualizar Compra OS #{{ ordem.id }}{% endblock %}
{% block nav_compras %}active{% endblock %}

{% block content %}
<h1 class="h3 mb-4">
    <i class="bi bi-pencil-square me-2" aria-hidden="true"></i>Atualizar Compra — OS
    <span class="text-muted">#{{ ordem.id }}</span>
</h1>

<div class="card shadow-sm" style="max-width:560px;">
    <div class="card-body p-4">
        <form method="post" novalidate aria-label="Formulário de atualização de compra">
            {% csrf_token %}
            {% crispy form %}
        </form>
    </div>
</div>
{% endblock %}
